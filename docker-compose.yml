
services:
  postgres:
    image: postgres:16-alpine
    container_name: epms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: epms_db
      POSTGRES_USER: epms_user
      POSTGRES_PASSWORD: epms_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epms_user -d epms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: epms_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://epms_user:epms_pass@postgres:5432/epms_db
      JWT_SECRET: epms-super-secret-jwt-key-change-in-production-2024
      JWT_EXPIRES_IN: 8h
      PORT: 5000
      NODE_ENV: production
      BCRYPT_ROUNDS: 10
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: epms_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local
